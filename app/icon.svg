    <!-- rating star center -->
    <path d="M0 -14 l6.2 12.6 13.9 2 -10.1 9.8 2.4 13.8 -12.4 -6.5 -12.4 6.5 2.4 -13.8 -10.1 -9.8 13.9 -2 Z" fill="#0a0a0a"/>
